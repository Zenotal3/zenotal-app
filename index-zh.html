<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenotal Reset</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/pages/launch.css">
    <link rel="stylesheet" href="css/pages/emotion-wheel.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script>
document.addEventListener('DOMContentLoaded', function() {
    // 测试按钮的点击事件
    var testButton = document.getElementById('testButton');
    if (testButton) {
        testButton.addEventListener('click', function() {
            alert('测试按钮被点击了！');
            console.log('测试按钮被点击');
        });
    }
});
</script>
<script type="module" src="/js/auth.js"></script>

</head>

<body>
    <!-- Authentication Header -->
    <div class="auth-header">
        <button id="auth-sign-in" class="auth-btn">登录</button>
        <button id="auth-sign-up" class="auth-btn">注册</button>
        <a id="dashboard-link" href="dashboard-zh.html" class="auth-btn dashboard-link" style="display:none;">我的旅程</a>
        <div id="auth-user-info" style="display:none;"></div>
    </div>

    <!-- Auth Modal -->
    <div id="auth-modal" class="auth-modal-overlay">
        <div class="auth-modal-card">
            <button id="auth-modal-close" class="auth-modal-close">&times;</button>

            <!-- Sign Up Form -->
            <form id="auth-signup-form" class="auth-form" autocomplete="off">
                <h2 class="auth-modal-title">创建账号</h2>
                <div class="auth-error"></div>
                <div class="auth-input-group">
                    <label>姓名（选填）</label>
                    <input type="text" name="name" placeholder="您的姓名" autocomplete="name">
                </div>
                <div class="auth-input-group">
                    <label>邮箱</label>
                    <input type="email" name="email" placeholder="您的邮箱" required autocomplete="email">
                </div>
                <div class="auth-input-group">
                    <label>密码</label>
                    <input type="password" name="password" placeholder="Create a password" required autocomplete="new-password">
                    <span class="auth-password-hint">至少 6 个字符</span>
                </div>
                <button type="submit" class="auth-submit-btn">注册</button>
                <div class="auth-divider"><span>or</span></div>
                <div class="auth-oauth-buttons">
                    <button type="button" id="auth-oauth-google" class="auth-oauth-btn">

                        GitHub
                    </button>
                </div>
                <p class="auth-toggle">Already have an account? <a href="#" id="auth-goto-signin">登录</a></p>
            </form>

            <!-- Sign In Form -->
            <form id="auth-signin-form" class="auth-form" autocomplete="off">
                <h2 class="auth-modal-title">欢迎回来</h2>
                <div class="auth-error"></div>
                <div class="auth-input-group">
                    <label>邮箱</label>
                    <input type="email" name="email" placeholder="您的邮箱" required autocomplete="email">
                </div>
                <div class="auth-input-group">
                    <label>密码</label>
                    <input type="password" name="password" placeholder="Your password" required autocomplete="current-password">
                </div>
                <button type="submit" class="auth-submit-btn">登录</button>
                <div class="auth-divider"><span>or</span></div>
                <div class="auth-oauth-buttons">
                    <button type="button" class="auth-oauth-btn" onclick="document.getElementById('auth-oauth-google').click()">

                        Google
                    </button>
                    <button type="button" class="auth-oauth-btn" onclick="document.getElementById('auth-oauth-github').click()">
                        <svg viewBox="0 0 24 24" fill="#333"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>
                        GitHub
                    </button>
                </div>
                <p class="auth-toggle">Need an account? <a href="#" id="auth-goto-signup">注册</a></p>
            </form>

            <!-- Verify Email Form -->
            <form id="auth-verify-form" class="auth-form" autocomplete="off">
                <h2 class="auth-modal-title">请检查您的邮箱</h2>
                <p class="auth-verify-info" style="text-align:center;line-height:1.6;">我们已向您的邮箱发送了确认链接。<br>点击链接完成注册并访问您的控制台。</p>
                <div class="auth-error"></div>
                <button type="submit" class="auth-submit-btn">知道了</button>
            </form>
        </div>
    </div>

                    <circle cx="27.8171" cy="31.1099" r="2.7439" fill="white"/>
                    <circle cx="43.1829" cy="31.1099" r="2.7439" fill="white"/>
                    <path id="mouth" d="M26.1709 40.2622C31.5287 45.62 40.2154 45.62 45.5732 40.2622" stroke="white" stroke-width="4"/>
                    <circle cx="35.5" cy="35.5" r="21" stroke="white" stroke-width="3"/>
                </svg>
            </div>
            
            <!-- Slider container -->
            <div class="stress-slider-container">
                <svg width="500" height="100" viewBox="0 0 500 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <!-- Background track -->
                    <line x1="50" y1="50" x2="450" y2="50" stroke="#E0E0E0" stroke-width="8" stroke-linecap="round"/>
                    
                    <!-- Progress track -->
                    <line id="stress-progress" x1="50" y1="50" x2="50" y2="50" stroke="#F08763" stroke-width="8" stroke-linecap="round"/>
                    
                    <!-- Draggable handle -->
                    <circle id="stress-handle" cx="50" cy="50" r="12" fill="#FFFFFF" stroke="#F08763" stroke-width="3" style="cursor: grab;"/>
                    
                    <!-- Percentage labels at ends -->
                    <text x="50" y="80" text-anchor="middle" font-family="Outfit, sans-serif" font-size="14" font-weight="400" fill="#666">0%</text>
                    <text x="450" y="80" text-anchor="middle" font-family="Outfit, sans-serif" font-size="14" font-weight="400" fill="#666">100%</text>
                    
                    <!-- Current percentage (moves with handle, positioned below) -->
                    <text id="current-percentage" x="50" y="75" text-anchor="middle" font-family="Outfit, sans-serif" font-size="16" font-weight="600" fill="#333">0%</text>
                </svg>
            </div>
            
            <!-- Text above continue button -->
            <div class="stress-title">
                <h2>你现在感觉有多紧张？</h2>
            </div>
            
            <!-- Continue button -->
            <div class="stress-continue-btn-container">
                <button id="stressContinueBtn" class="stress-continue-btn">继续</button>
            </div>
        </div>
    </div>

    <!-- App Container (initially hidden) -->
    <div id="appContainer" class="app-container" style="display: none;">
        <div id="chatWindow" class="chat-window"></div>
        <div class="input-container">
            <input type="text" id="userInput" placeholder="Type your message...">
            <button id="speakBtn">🔊</button>
            <button id="sendBtn">发送</button>
        </div>
    </div>
    
    <!-- Scripts -->
    <script src="js/api.production-zh.js"></script>
    <script src="js/speech.js"></script>
    <script src="js/tts.js"></script>
    <script src="js/navigation.js"></script>
    <script src="js/pages/launch-zh.js"></script>
    <script src="js/pages/emotion-wheel-zh.js"></script>
    <script src="js/pages/app-zh.js"></script>
</body>
</html>
