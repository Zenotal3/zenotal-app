        <div class="prompt-text">
            What's closest to how you feel right now?
        </div>

        <div class="emotion-cards-wrapper">
            <div class="emotion-cards-container">
                <!-- This will be a slidable/swipeable container -->
                <div class="emotion-cards-slider">
                    <!-- Cards will be dynamically generated by JavaScript -->
                </div>
            </div>
        </div>
            
        <!-- This container appears when a card is clicked -->
        <div class="expanded-card-container" style="display: none;">
            <!-- The expanded card content will be dynamically inserted here -->
        </div>
           
        <!-- This container appears when a card is clicked -->
        <div class="expanded-card-container" style="display: none;">
            <!-- The expanded card content will be dynamically inserted here -->
        </div>
    </div>

    <!-- Stress Checker Page (initially hidden) -->
    <div id="stressCheckerPage" class="stress-checker-container" style="display: none;">
        <!-- Dimmed background (emotion wheel) -->
        <div class="stress-checker-backdrop"></div>
        
        <!-- Modal window/box -->
        <div class="stress-checker-modal">
            <!-- Close button (cross) -->
            <button id="stressCloseBtn" class="stress-close-btn">×</button>
            
            <!-- Emoji with teardrop shape -->
            <div class="stress-emoji-container">
                <svg id="stress-emoji-bg" width="70" height="88" viewBox="0 0 70 88" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M70 35C70 54.33 35 88 35 88C35 88 0 54.33 0 35C0 15.67 15.67 0 35 0C54.33 0 70 15.67 70 35Z" fill="#F08763"/>
                    <circle cx="27.8171" cy="31.1099" r="2.7439" fill="white"/>
                    <circle cx="43.1829" cy="31.1099" r="2.7439" fill="white"/>
                    <path id="mouth" d="M26.1709 40.2622C31.5287 45.62 40.2154 45.62 45.5732 40.2622" stroke="white" stroke-width="4"/>
                    <circle cx="35.5" cy="35.5" r="21" stroke="white" stroke-width="3"/>
                </svg>
            </div>
            
            <!-- Slider container -->
            <div class="stress-slider-container">
                <svg width="500" height="100" viewBox="0 0 500 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <!-- Background track -->
                    <line x1="50" y1="50" x2="450" y2="50" stroke="#E0E0E0" stroke-width="8" stroke-linecap="round"/>
                    
                    <!-- Progress track -->
                    <line id="stress-progress" x1="50" y1="50" x2="50" y2="50" stroke="#F08763" stroke-width="8" stroke-linecap="round"/>
                    
                    <!-- Draggable handle -->
                    <circle id="stress-handle" cx="50" cy="50" r="12" fill="#FFFFFF" stroke="#F08763" stroke-width="3" style="cursor: grab;"/>
                    
                    <!-- Percentage labels at ends -->
                    <text x="50" y="80" text-anchor="middle" font-family="Outfit, sans-serif" font-size="14" font-weight="400" fill="#666">0%</text>
                    <text x="450" y="80" text-anchor="middle" font-family="Outfit, sans-serif" font-size="14" font-weight="400" fill="#666">100%</text>
                    
                    <!-- Current percentage (moves with handle, positioned below) -->
                    <text id="current-percentage" x="50" y="75" text-anchor="middle" font-family="Outfit, sans-serif" font-size="16" font-weight="600" fill="#333">0%</text>
                </svg>
            </div>
            
            <!-- Text above continue button -->
            <div class="stress-title">
                <h2>How tense do you feel right now?</h2>
            </div>
            
            <!-- Continue button -->
            <div class="stress-continue-btn-container">
                <button id="stressContinueBtn" class="stress-continue-btn">Continue</button>
            </div>
        </div>
    </div>

    <!-- App Container (initially hidden) -->
    <div id="appContainer" class="app-container" style="display: none;">
        <div id="chatWindow" class="chat-window"></div>
        <div class="input-container">
            <input type="text" id="userInput" placeholder="Type your message...">
            <button id="speakBtn">🔊</button>
            <button id="sendBtn">Send</button>
        </div>
    </div>
